name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'SemVer 版本号，例如 0.1.0 或 0.1.0-rc.1'
        required: true
        type: string
      prerelease:
        description: '标记为 pre-release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Build & publish Windows x64
    runs-on: windows-latest
    steps:
      - name: 校验版本号格式
        shell: pwsh
        run: |
          $ver = '${{ inputs.version }}'
          if ($ver -notmatch '^\d+\.\d+\.\d+(-[a-z0-9.]+)?$') {
            Write-Error "版本号 '$ver' 不符合 SemVer 格式（如 0.1.0 或 0.1.0-rc.1）"
            exit 1
          }
          # AssemblyVersion 只允许 4 段数字，去掉 -xxx 后缀
          $numeric = $ver -replace '-.*',''
          "VERSION=$ver"                  | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "VERSION_NUMERIC=$numeric"      | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "STAGE_NAME=VoxPen-$ver-win-x64" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        # 避免依赖 .slnx（需要新版 SDK），按项目 restore。
        # 注意：App 这里不要传 -r win-x64——.NET 10 SDK 下这个组合有时
        # 不会把 win-x64 pivot 写进 project.assets.json，导致后续 publish
        # --no-restore 时 NETSDK1047。让 publish 自己 restore 更稳。
        run: |
          dotnet restore src/VoxPen.App/VoxPen.App.csproj
          dotnet restore tests/VoxPen.Core.Tests/VoxPen.Core.Tests.csproj

      - name: Test
        run: dotnet test tests/VoxPen.Core.Tests/VoxPen.Core.Tests.csproj --no-restore -c Release --logger "console;verbosity=normal"

      - name: Package release archive
        shell: pwsh
        # 脚本不传 --no-restore：让 publish 自己带上 -r win-x64 做 RID-aware restore。
        # NuGet 包已缓存，实际只是 obj/assets 重算，代价 <10 秒。
        run: ./scripts/package.ps1 -Version $env:VERSION

      - name: Generate release notes
        shell: pwsh
        run: |
          # 找到上一个 tag（首次发版时可能没有）
          $prevTag = $null
          $desc = git describe --tags --abbrev=0 2>$null
          if ($LASTEXITCODE -eq 0 -and $desc) { $prevTag = $desc.Trim() }
          $global:LASTEXITCODE = 0

          if ($prevTag) {
            $range = "$prevTag..HEAD"
            Write-Host "Previous tag: $prevTag"
          } else {
            $range = 'HEAD'
            Write-Host "First release, using full history"
          }

          # 拉取 commit（跳过 merge），格式："<hash> <subject>"
          $raw = git log $range --no-merges --pretty=format:'%h %s'
          if (-not $raw) { $raw = @() }

          # 按 conventional commits 前缀分组（保持顺序）
          $groups = [ordered]@{
            '🚀 新功能' = New-Object System.Collections.Generic.List[string]
            '🐛 修复'   = New-Object System.Collections.Generic.List[string]
            '🔧 优化'   = New-Object System.Collections.Generic.List[string]
            '📝 杂项'   = New-Object System.Collections.Generic.List[string]
            '其他'      = New-Object System.Collections.Generic.List[string]
          }

          foreach ($line in @($raw)) {
            if (-not $line) { continue }
            if ($line -notmatch '^(\S+)\s+(.+)$') { continue }
            $hash = $Matches[1]
            $subject = $Matches[2]

            $bucket = '其他'
            $msg = $subject
            if     ($subject -match '^(feat|feature)(\([^)]+\))?!?:\s*(.+)$') { $bucket = '🚀 新功能'; $msg = $Matches[3] }
            elseif ($subject -match '^fix(\([^)]+\))?!?:\s*(.+)$')            { $bucket = '🐛 修复';   $msg = $Matches[2] }
            elseif ($subject -match '^(refactor|perf)(\([^)]+\))?!?:\s*(.+)$'){ $bucket = '🔧 优化';   $msg = $Matches[3] }
            elseif ($subject -match '^(docs|chore|build|ci|style|test)(\([^)]+\))?!?:\s*(.+)$') { $bucket = '📝 杂项'; $msg = $Matches[3] }

            $groups[$bucket].Add("- $msg (``$hash``)")
          }

          # 组装 markdown
          $md = New-Object System.Collections.Generic.List[string]
          foreach ($key in $groups.Keys) {
            if ($groups[$key].Count -gt 0) {
              $md.Add("### $key")
              $md.Add('')
              foreach ($item in $groups[$key]) { $md.Add($item) }
              $md.Add('')
            }
          }

          if ($md.Count -eq 0) {
            $md.Add('_本次版本无 commit 变更。_')
            $md.Add('')
          }

          $repo = $env:GITHUB_REPOSITORY
          if ($prevTag) {
            $md.Add("**Full Changelog**: https://github.com/$repo/compare/$prevTag...v$env:VERSION")
          } else {
            $md.Add("**Full Changelog**: https://github.com/$repo/commits/v$env:VERSION")
          }

          $md -join "`n" | Out-File -FilePath notes.md -Encoding utf8
          Write-Host '----- notes.md -----'
          Get-Content notes.md | Write-Host

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $zip = "$env:STAGE_NAME.zip"
          $runtimeZip = "$env:STAGE_NAME-requires-dotnet-8-runtime.zip"
          $ghArgs = @(
            'release','create',"v$env:VERSION",
            $zip,"$zip.sha256",$runtimeZip,"$runtimeZip.sha256",
            '--title',"VoxPen v$env:VERSION",
            '--notes-file','notes.md',
            '--target',$env:GITHUB_SHA
          )
          if ('${{ inputs.prerelease }}' -eq 'true') { $ghArgs += '--prerelease' }
          & gh @ghArgs
